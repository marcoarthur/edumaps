; ============================================================
; dist.ini — EduMaps Backend
; ============================================================
name    = EduMaps
author  = Marco Arthur <arthurpbs@gmail.com>
license = Perl_5
copyright_holder = Marco Arthur
copyright_year   = 2025

; Versão principal da dist — propagada a todos os módulos via [PkgVersion]
version = 0.001

; ============================================================
; Coleta de arquivos: inclui lib/, mas EXCLUI Schema/* e MyApp
; ============================================================
[GatherDir]
exclude_match = ^lib/EduMaps/Schema/Result/
exclude_match = ^lib/MyApp/

; Declara explicitamente qual é o módulo principal
[Prereqs / RuntimeRequires]

; Exclui também arquivos gerados / temporários comuns
[PruneCruft]
[ManifestSkip]

; ============================================================
; Versionamento automático: injeta $VERSION em cada .pm
; (exceto os já excluídos acima)
; ============================================================
[PkgVersion]
; Adiciona:  our $VERSION = '0.001';
; em cada módulo coletado

; Se quiser versão derivada do Git (recomendado para projetos ativos):
; [Git::NextVersion]
; version_regexp = ^v([\d._]+)$

; ============================================================
; Geração de POD / documentação
; ============================================================

; Gera README a partir do POD do módulo principal
; [Readme]
; ou use o ReadmeAnyFromPod para mais controle:
[ReadmeAnyFromPod]
type     = markdown
filename = README.md
location = root

; Verifica se todos os módulos têm POD mínimo
;[PodWeaver]
; Requer um weaver.ini separado (veja abaixo)
; Se preferir algo mais simples, troque por:
; [PodCoverageTests]

; ============================================================
; Testes automáticos
; ============================================================
[Test::Compile]       ; verifica se todos os .pm compilam — OK, existe

[PodSyntaxTests]      ; substitui [Test::Pod]      — gera xt/author/pod-syntax.t
[PodCoverageTests]    ; substitui [Test::PodCoverage] — gera xt/author/pod-coverage.t

; ============================================================
; Manifesto e meta
; ============================================================
[Manifest]
[MetaYAML]
[MetaJSON]

[MetaResources]
repository.type = git
repository.url  = https://github.com/marcoarthur/edumaps.git

; ============================================================
; Dependências (prereqs) — detectadas automaticamente
; ============================================================
[AutoPrereqs]
; Ignora módulos do namespace legado que não estão na dist
skip = ^MyApp::

; Gera/atualiza o cpanfile a partir das prereqs detectadas
[CPANFile]
filename = cpanfile

; Copia o cpanfile gerado de volta para a raiz automaticamente
; [Run::AfterBuild]
; run = cp %d/cpanfile cpanfile
; ============================================================
; Build / instalação
; ============================================================
[MakeMaker]
; ou [ModuleBuild] / [ModuleBuildTiny] conforme sua preferência

[InstallGuide]
